<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Login in</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=account_box" />
    </head>
    <form>
        <h1>Sign Up</h1>
        <div class="inputs">
            <label>
                Username
                <input class="input" type="text">
            </label>

            <label>
                Email
                <input class="input"type="email">
            </label>

            <label>
                Date of Birth
                <input class="input" type="date">
            </label>

            <label>
                Password
                <input class="input" type="password">
            </label>
            <label>
                Confirm Password
                <input class="input" type="password">
            </label>
            <label>
                <input class="checkbox" type="checkbox">
                I agree to the <strong>Terms and Conditions</strong>
            </label>
            <label>
                <input class="checkbox" type="checkbox">
                I want to receive the newsletter
            </label>
        </div>
        <button class="signin" type="submit">Sign Up</button>
        <p>Already have an account?<strong> Login now</strong></p>
    </form>
</html>
